<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Faculty Finance Flow</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the current path in sessionStorage so index.html can restore it
      var path = window.location.pathname;
      // Strip the repo base (/faculty-finance-flow) from the stored path
      var base = '/faculty-finance-flow';
      var rest = path.startsWith(base) ? path.slice(base.length) : path;
      sessionStorage.setItem('spa-redirect', rest || '/');
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
